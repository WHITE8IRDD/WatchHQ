appId: com.watchhq.app
productName: WatchHQ
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/ffmpeg-static/bin/${/*}"
  - "node_modules/ffmpeg-static/bin/${os}/${arch}/ffmpeg${ext}"
asarUnpack:
  - "node_modules/ffmpeg-static/**/*"
win:
  target:
    - nsis
    - portable
mac:
  target:
    - dmg
  category: public.app-category.video
linux:
  target:
    - AppImage
    - deb
  category: Video
